<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Animation Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #CD6E58;
    font-size: 24px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 11px;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
    justify-items: center;
  }
  .card {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .card-preview {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    background: #F9F7F4;
  }
  .card-preview iframe {
    width: 720px;
    height: 720px;
    border: none;
    transform: scale(0.5);
    transform-origin: top left;
    pointer-events: none;
  }
  .card-label {
    padding: 10px 12px;
    color: #aaa;
    font-size: 12px;
    text-align: center;
    letter-spacing: 1px;
    text-transform: capitalize;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card-preview iframe { transform: scale(0.45); }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; max-width: 400px; }
    .card-preview iframe { transform: scale(0.55); }
  }
</style>
</head>
<body>
<h1>Clawd Animation Gallery</h1>
<div class="subtitle">Clawd 像素风动画合集</div>
<div class="grid" id="grid"></div>

<script>
const anims = [
  { file: 'clawd-desk-work.html',  label: '电脑前工作' },
  { file: 'clawd-fishing.html',   label: '钓鱼' },
  { file: 'clawd-beach-walk.html', label: '沙滩漫步' },
  { file: 'clawd-bedtime.html',   label: '睡觉' },
  { file: 'clawd-birthday.html',  label: '生日' },
  { file: 'clawd-coconut-sip.html', label: '喝椰子水' },
  { file: 'clawd-guitar.html',    label: '吉他' },
  { file: 'clawd-icecream.html',  label: '吃冰淇淋' },
  { file: 'clawd-kiss.html',      label: '亲亲' },
  { file: 'clawd-lilypad.html',   label: '睡莲' },
  { file: 'clawd-treasure.html',  label: '寻宝' },
  { file: 'clawd-volleyball.html', label: '排球' },
];

const grid = document.getElementById('grid');
for (const a of anims) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    `<div class="card-preview"><iframe src="${a.file}" scrolling="no"></iframe></div>
     <div class="card-label">${a.label}</div>`;
  grid.appendChild(card);
}
</script>
</body>
</html>
